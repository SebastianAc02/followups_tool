# Vive en ~/followups-tool/ del VPS (mismo repo, clonado ahí). Se une a la red
# "onepay" ya creada por el stack de Evolution (ver ~/evolution/docker-compose.yml
# en whatsapp-osserver/DEPLOY-VPS.md) -- misma imagen para web y worker, mismo
# volumen de DB (SQLite en WAL: un escritor, funciona con los dos procesos en el
# mismo host). Caddy es la única puerta pública (80/443); todo lo demás solo vive
# en la red interna onepay.

networks:
  onepay:
    external: true

services:
  followups-web:
    # Unico servicio que CONSTRUYE, y nombra la imagen para que el worker la reuse.
    # Antes los dos declaraban `build: .` con el mismo Dockerfile y contexto: Compose
    # lanzaba dos builds de Next EN PARALELO para producir dos imagenes identicas. En
    # una caja de 7.6GB sin swap eso reventaba la memoria y el kernel se llevaba por
    # delante al daemon de Docker, tumbando TODOS los contenedores del host (caido el
    # 2026-07-15). Un solo build: mitad de memoria y mitad de tiempo.
    build: .
    image: followups-tool:latest
    container_name: followups_web
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - followups_data:/data
    networks:
      - onepay

  followups-worker:
    # Sin `build:` a proposito: reusa la imagen que ya construyo followups-web.
    image: followups-tool:latest
    depends_on:
      - followups-web
    container_name: followups_worker
    # No usar "npm run worker": ese script trae --env-file=.env.local hardcodeado
    # (conveniencia de dev local). En el contenedor las variables ya llegan via
    # env_file: de Compose -- ese flag exige que el archivo exista y no existe aca.
    command: ["node", "--experimental-strip-types", "--experimental-loader", "./scripts/resolve-ts-ext.mjs", "./app/worker/index.ts"]
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - followups_data:/data
    networks:
      - onepay

  caddy:
    image: caddy:2-alpine
    container_name: followups_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - onepay
    depends_on:
      - followups-web

volumes:
  followups_data:
  caddy_data:
  caddy_config:
