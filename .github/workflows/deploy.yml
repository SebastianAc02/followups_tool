name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Gate: nada llega al VPS si esto no pasa entero. tsc/tests/build corren en una
  # maquina limpia de GitHub, no en el server -- codigo roto nunca toca produccion.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - name: build
        # Mismo motivo que en el Dockerfile: app/db/index.ts abre las DOS bases en la
        # carga del modulo, next build necesita rutas validas para eso, no reales. Sin
        # PRUEBAS_DB_PATH el default es una ruta del Mac de Sebastian que aca no existe,
        # y better-sqlite3 revienta ("Cannot open database because the directory does
        # not exist"): el build pasaba en local solo porque alli el archivo si esta.
        env:
          ISPS_DB_PATH: ":memory:"
          PRUEBAS_DB_PATH: ":memory:"
        run: npm run build

  # Deploy: solo si el gate paso. Entra al VPS por SSH con una llave dedicada (no la
  # personal de Sebastian) y hace git pull + rebuild -- no tumba Caddy ni la red onepay,
  # solo recrea followups-web y followups-worker.
  deploy:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy por SSH al VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key deploy@${{ secrets.VPS_HOST }} '
            set -e
            cd ~/followups-tool
            PREV=$(git rev-parse HEAD)
            git pull origin main
            # Solo si el Caddyfile cambio en este pull, reiniciar Caddy para aplicarlo
            # (probado: "caddy reload" no aplica de forma confiable, un restart si). En
            # deploys normales el Caddyfile no cambia -> Caddy no se toca y su retry
            # (lb_try_duration) sigue activo, absorbiendo la recreacion del web sin 502.
            if git diff --name-only "$PREV" HEAD | grep -qx "Caddyfile"; then
              docker compose -f docker-compose.production.yml restart caddy
            fi
            docker compose -f docker-compose.production.yml build followups-web followups-worker
            # Aplica contra isps.db real cualquier migracion nueva (drizzle/*.sql) antes
            # de recrear los contenedores -- ver scripts/migrate.ts. Corre una sola vez,
            # con la imagen recien construida, no en cada arranque de contenedor.
            docker compose -f docker-compose.production.yml run --rm followups-web npm run migrate
            # pruebas.db nace con el MISMO esquema que la real (migrate apunta a ella via
            # ISPS_DB_PATH, ver el plan de modo-prueba). Sin este paso el archivo se crea
            # vacio y el toggle de modo prueba revienta al primer query. Cero filas de
            # negocio a proposito: en modo prueba no hay ISP real al que escribirle.
            docker compose -f docker-compose.production.yml run --rm -e ISPS_DB_PATH=/data/pruebas.db followups-web npm run migrate
            docker compose -f docker-compose.production.yml up -d
          '
